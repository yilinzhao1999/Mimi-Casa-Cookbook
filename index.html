<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mimi Casa Cookbook</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mimi Casa Cookbook">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Libre+Franklin:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root{
  --paper: #FBF7EF;
  --paper-card: #FFFEFB;
  --ink: #2B2620;
  --ink-soft: #6B6255;
  --pine: #3C6255;
  --pine-dark: #2A4740;
  --mustard: #C98A3A;
  --mustard-soft: #EFD9B4;
  --line: #DED2BC;
  --brick: #A6432F;
  --shadow: rgba(43, 38, 32, 0.12);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Libre Franklin', sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}

#app{
  max-width:640px;
  margin:0 auto;
  padding:0 18px 120px;
  min-height:100vh;
}

/* ---------- Header ---------- */
header.top{
  padding:28px 0 18px;
  position:relative;
}
header.top .eyebrow{
  font-family:'Space Mono', monospace;
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--pine);
  margin:0 0 4px;
}
header.top h1{
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size:34px;
  margin:0;
  line-height:1.05;
  color:var(--ink);
}
header.top h1 em{
  font-style:italic;
  font-weight:500;
  color:var(--pine);
}

/* ---------- Tabs ---------- */
.tabs{
  display:flex;
  gap:6px;
  margin:22px 0 20px;
  border-bottom:1px solid var(--line);
  overflow-x:auto;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  font-family:'Libre Franklin', sans-serif;
  font-weight:600;
  font-size:13.5px;
  letter-spacing:.01em;
  color:var(--ink-soft);
  background:none;
  border:none;
  padding:9px 4px 12px;
  margin-right:18px;
  cursor:pointer;
  white-space:nowrap;
  position:relative;
  border-bottom:2px solid transparent;
  transition:color .15s ease;
}
.tab:last-child{margin-right:0;}
.tab.active{
  color:var(--pine-dark);
  border-bottom:2px solid var(--pine);
}
.tab .count{
  font-family:'Space Mono', monospace;
  font-size:10.5px;
  color:var(--ink-soft);
  margin-left:5px;
}

/* ---------- Filter bar ---------- */
.filter-bar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  margin:-8px 0 18px;
}
.filter-chip{
  font-family:'Libre Franklin', sans-serif;
  font-weight:600;
  font-size:12px;
  padding:6px 12px;
  border-radius:20px;
  border:1px solid var(--line);
  background:var(--paper-card);
  color:var(--ink-soft);
  cursor:pointer;
  white-space:nowrap;
}
.filter-chip.active{
  background:var(--pine);
  border-color:var(--pine);
  color:#fff;
}
.cuisine-filter-select{
  font-family:'Libre Franklin', sans-serif;
  font-weight:600;
  font-size:12px;
  padding:6px 10px;
  border-radius:20px;
  border:1px solid var(--line);
  background:var(--paper-card);
  color:var(--ink-soft);
  cursor:pointer;
}
.filter-clear{
  font-family:'Space Mono', monospace;
  font-size:11px;
  color:var(--brick);
  background:none;
  border:none;
  cursor:pointer;
  text-decoration:underline;
  padding:6px 4px;
}
.card-tags{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:6px;
}
.card-tag{
  font-family:'Space Mono', monospace;
  font-size:10px;
  color:#7a5320;
  background:var(--mustard-soft);
  padding:2px 8px;
  border-radius:12px;
}

/* ---------- Recipe grid ---------- */
.grid{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.recipe-card{
  background:var(--paper-card);
  border:1px solid var(--line);
  border-radius:3px;
  padding:16px 16px 14px;
  cursor:pointer;
  position:relative;
  box-shadow:0 1px 2px var(--shadow);
  transition:transform .12s ease, box-shadow .12s ease;
}
.recipe-card:active{transform:scale(0.99);}
.recipe-card.has-image{
  display:flex;
  gap:12px;
  align-items:flex-start;
}
.recipe-card .thumb{
  width:64px;
  height:64px;
  border-radius:6px;
  object-fit:cover;
  flex-shrink:0;
  background:var(--mustard-soft);
  border:1px solid var(--line);
}
.recipe-card .card-body{flex:1;min-width:0;}

.recipe-card .pin{
  position:absolute;
  top:14px;
  right:14px;
  width:26px;
  height:26px;
  border-radius:50%;
  border:1.5px solid var(--line);
  background:var(--paper);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:background .15s ease, border-color .15s ease;
  flex-shrink:0;
}
.recipe-card .pin svg{width:13px;height:13px;stroke:var(--ink-soft);transition:stroke .15s ease;}
.recipe-card .pin.selected{background:var(--pine);border-color:var(--pine);}
.recipe-card .pin.selected svg{stroke:#fff;}
.recipe-card h3{
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size:19px;
  margin:0 6px 6px 0;
  padding-right:32px;
  color:var(--ink);
  line-height:1.2;
}
.recipe-card .meta{
  font-family:'Space Mono', monospace;
  font-size:11px;
  color:var(--ink-soft);
  letter-spacing:.02em;
}
.recipe-card .meta span:not(:last-child)::after{
  content:"·";
  margin:0 7px;
  color:var(--line);
}

.empty-state{
  padding:48px 12px;
  text-align:center;
  color:var(--ink-soft);
}
.empty-state .glyph{
  font-family:'Fraunces', serif;
  font-style:italic;
  font-size:22px;
  color:var(--pine);
  margin-bottom:8px;
  display:block;
}
.empty-state p{margin:4px 0 0;font-size:14px;}

/* ---------- Floating buttons ---------- */
.fab-row{
  position:fixed;
  bottom:22px;
  left:0;right:0;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  padding:0 12px;
  pointer-events:none;
  z-index:40;
}
.fab-row > *{pointer-events:auto;}
.fab{
  font-family:'Libre Franklin', sans-serif;
  font-weight:600;
  font-size:14px;
  border:none;
  border-radius:30px;
  padding:14px 22px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  white-space:nowrap;
  flex-shrink:0;
  box-shadow:0 4px 14px rgba(43,38,32,0.22);
  transition:transform .12s ease;
}
.fab svg{width:16px;height:16px;stroke:currentColor;flex-shrink:0;}
.fab:active{transform:scale(0.97);}
@media (max-width:430px){
  .fab{padding:12px 16px;font-size:13px;gap:6px;}
}
.fab-add{
  background:var(--pine);
  color:#fff;
}
.fab-menu{
  background:var(--mustard);
  color:var(--ink);
}
.fab-cart{
  background:var(--ink);
  color:#fff;
}
.fab .badge{
  background:var(--mustard);
  color:var(--ink);
  font-family:'Space Mono', monospace;
  font-size:11px;
  font-weight:700;
  border-radius:20px;
  padding:1px 7px;
  min-width:18px;
  text-align:center;
}
.fab-menu .badge{
  background:var(--ink);
  color:#fff;
}

/* ---------- Modal / overlay ---------- */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(43,38,32,0.42);
  z-index:100;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease;
}
.overlay.show{opacity:1;pointer-events:auto;}
.sheet{
  background:var(--paper);
  width:100%;
  max-width:640px;
  max-height:92vh;
  border-radius:16px 16px 0 0;
  overflow-y:auto;
  padding:22px 20px calc(28px + env(safe-area-inset-bottom));
  transform:translateY(24px);
  transition:transform .22s ease;
  box-shadow:0 -6px 30px rgba(0,0,0,0.2);
}
.overlay.show .sheet{transform:translateY(0);}
.sheet-handle{
  width:36px;height:4px;background:var(--line);border-radius:3px;
  margin:0 auto 18px;
}
.sheet-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:4px;
}
.sheet h2{
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size:26px;
  margin:0;
  line-height:1.1;
  flex:1;
}
.icon-btn{
  background:none;
  border:none;
  cursor:pointer;
  color:var(--ink-soft);
  padding:4px;
  flex-shrink:0;
}
.icon-btn svg{width:20px;height:20px;stroke:currentColor;}

.serving-stepper{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:22px;
  padding:10px 4px;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.serving-stepper .label{
  font-family:'Space Mono', monospace;
  font-size:11px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--pine);
}
.stepper-controls{
  display:flex;
  align-items:center;
  gap:14px;
}
.stepper-controls button{
  width:32px;height:32px;
  border-radius:50%;
  border:1.5px solid var(--pine);
  background:var(--paper-card);
  color:var(--pine-dark);
  font-size:18px;
  font-weight:700;
  line-height:1;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.stepper-controls button:active{background:var(--mustard-soft);}
.stepper-controls .count{
  font-family:'Space Mono', monospace;
  font-size:16px;
  font-weight:700;
  color:var(--ink);
  min-width:60px;
  text-align:center;
}
.ing-list li .scaled{color:var(--pine-dark);}
.section-label{
  font-family:'Space Mono', monospace;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--pine);
  margin:22px 0 10px;
}
.ing-list{list-style:none;margin:0;padding:0;}
.ing-list li{
  display:flex;
  gap:10px;
  padding:8px 0;
  border-bottom:1px dashed var(--line);
  font-size:14.5px;
}
.ing-list li:last-child{border-bottom:none;}
.ing-amt{
  font-family:'Space Mono', monospace;
  color:var(--pine-dark);
  font-weight:700;
  min-width:64px;
  flex-shrink:0;
}
.instructions{
  font-size:14.5px;
  line-height:1.7;
  white-space:pre-wrap;
  color:var(--ink);
}
.detail-image{
  width:100%;
  max-height:260px;
  object-fit:cover;
  border-radius:10px;
  margin-top:14px;
  border:1px solid var(--line);
  display:block;
}
.photo-field{margin-bottom:16px;}
.photo-upload{
  border:1.5px dashed var(--line);
  border-radius:10px;
  background:var(--paper-card);
  text-align:center;
  padding:22px 14px;
  cursor:pointer;
  color:var(--ink-soft);
  font-family:'Libre Franklin', sans-serif;
  font-size:13.5px;
  font-weight:600;
}
.photo-upload svg{width:22px;height:22px;stroke:var(--pine);display:block;margin:0 auto 8px;}
.photo-preview-wrap{position:relative;}
.photo-preview{
  width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:10px;
  display:block;
  border:1px solid var(--line);
}
.photo-remove{
  position:absolute;
  top:8px;right:8px;
  width:30px;height:30px;
  border-radius:50%;
  background:rgba(43,38,32,0.65);
  border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.photo-remove svg{width:15px;height:15px;stroke:#fff;}
.detail-meta-row{
  display:flex;
  gap:14px;
  margin-top:10px;
  font-family:'Space Mono', monospace;
  font-size:11.5px;
  color:var(--ink-soft);
}
.tag-pill{
  display:inline-block;
  background:var(--mustard-soft);
  color:#7a5320;
  font-family:'Space Mono', monospace;
  font-size:10.5px;
  padding:3px 9px;
  border-radius:20px;
  margin-top:10px;
}

.source-section{
  margin-top:22px;
  padding-top:16px;
  border-top:1px solid var(--line);
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}
.source-link{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-family:'Libre Franklin', sans-serif;
  font-weight:600;
  font-size:13px;
  color:var(--pine-dark);
  background:var(--paper-card);
  border:1px solid var(--line);
  border-radius:20px;
  padding:8px 14px;
  text-decoration:none;
}
.source-link svg{width:13px;height:13px;stroke:currentColor;flex-shrink:0;}
.source-thumb-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:none;
  border:1px solid var(--line);
  border-radius:20px;
  padding:5px 14px 5px 5px;
  cursor:pointer;
  font-family:'Libre Franklin', sans-serif;
  font-weight:600;
  font-size:13px;
  color:var(--ink);
}
.source-thumb-btn img{
  width:32px;
  height:32px;
  object-fit:cover;
  border-radius:50%;
  border:1px solid var(--line);
}

.import-box + .import-box{margin-top:10px;}
.source-field-group{margin-bottom:16px;}
.source-photo-row{
  display:flex;
  align-items:center;
  gap:10px;
}
.source-photo-upload{
  flex:0 0 auto;
  width:88px;
  height:88px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  border:1.5px dashed var(--line);
  border-radius:9px;
  background:var(--paper-card);
  text-align:center;
  padding:8px;
  cursor:pointer;
  color:var(--ink-soft);
  font-family:'Libre Franklin', sans-serif;
  font-size:10.5px;
  font-weight:600;
  line-height:1.25;
}
.source-photo-upload svg{width:16px;height:16px;stroke:var(--ink-soft);}
.source-photo-preview-wrap{position:relative;flex:0 0 auto;}
.source-photo-preview{
  width:88px;
  height:88px;
  object-fit:cover;
  border-radius:9px;
  display:block;
  border:1px solid var(--line);
}
.source-photo-preview-wrap .photo-remove{
  width:22px;
  height:22px;
  top:-6px;
  right:-6px;
}
.source-photo-preview-wrap .photo-remove svg{width:11px;height:11px;}

.toast{
  position:fixed;
  left:18px;
  right:18px;
  bottom:calc(90px + env(safe-area-inset-bottom));
  max-width:604px;
  margin:0 auto;
  background:var(--ink);
  color:#fff;
  border-radius:10px;
  padding:13px 14px 13px 16px;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 6px 20px rgba(0,0,0,0.25);
  z-index:300;
  font-size:13.5px;
  line-height:1.4;
}
.toast span{flex:1;}
.toast button{
  background:none;
  border:none;
  color:rgba(255,255,255,0.7);
  cursor:pointer;
  padding:4px;
  flex-shrink:0;
  display:flex;
}
.toast button svg{width:14px;height:14px;stroke:currentColor;}

.lightbox{
  position:fixed;
  inset:0;
  background:rgba(20,17,13,0.92);
  z-index:200;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease;
}
.lightbox.show{opacity:1;pointer-events:auto;}
.lightbox img{
  max-width:100%;
  max-height:100%;
  border-radius:6px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}
.lightbox-close{
  position:fixed;
  top:20px;
  right:20px;
  width:38px;height:38px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.lightbox-close svg{width:18px;height:18px;stroke:#fff;}
.sheet-actions{
  display:flex;
  gap:10px;
  margin-top:26px;
}
.btn{
  font-family:'Libre Franklin',sans-serif;
  font-weight:600;
  font-size:14px;
  padding:12px 16px;
  border-radius:8px;
  border:1px solid var(--line);
  background:var(--paper-card);
  color:var(--ink);
  cursor:pointer;
  flex:1;
  text-align:center;
}
.btn.primary{
  background:var(--pine);
  border-color:var(--pine);
  color:#fff;
}
.btn.danger{
  background:none;
  border-color:var(--brick);
  color:var(--brick);
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:6px;
}
.btn.danger svg{width:15px;height:15px;stroke:currentColor;flex-shrink:0;}
.btn.danger-solid{
  background:var(--brick);
  border-color:var(--brick);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.btn.danger-solid svg{width:15px;height:15px;stroke:currentColor;flex-shrink:0;}
.backup-explainer{
  font-size:13.5px;
  line-height:1.6;
  color:var(--ink-soft);
  margin-bottom:22px;
}
.backup-explainer strong{color:var(--ink);}
.backup-sub{
  font-family:'Space Mono', monospace;
  font-size:11px;
  color:var(--ink-soft);
  margin:0 0 10px;
}

.confirm-warning{
  font-size:14.5px;
  line-height:1.6;
  color:var(--ink-soft);
  background:#FBEDE8;
  border:1px solid #E7C6BB;
  border-radius:8px;
  padding:14px 15px;
  margin-top:16px;
}
.confirm-warning strong{color:var(--ink);}
.btn.btn-sm{
  font-size:12.5px;
  padding:8px 10px;
  gap:6px;
}
.btn.btn-sm svg{width:14px;height:14px;stroke:currentColor;flex-shrink:0;vertical-align:-2px;}

/* ---------- Form ---------- */
.field{margin-bottom:16px;}
.field label{
  display:block;
  font-family:'Space Mono', monospace;
  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-bottom:6px;
}
.label-pick-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.label-pick{
  font-family:'Libre Franklin', sans-serif;
  font-weight:600;
  font-size:13px;
  padding:8px 14px;
  border-radius:20px;
  border:1px solid var(--line);
  background:var(--paper-card);
  color:var(--ink-soft);
  cursor:pointer;
  white-space:nowrap;
}
.label-pick.active{
  background:var(--pine);
  border-color:var(--pine);
  color:#fff;
}

.field-label-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:6px;
}
.field-label-row label{margin-bottom:0;}
.manage-link{
  font-family:'Space Mono', monospace;
  font-size:10.5px;
  color:var(--pine-dark);
  background:none;
  border:none;
  cursor:pointer;
  text-decoration:underline;
  padding:0;
}
.manage-list{
  list-style:none;
  margin:0 0 4px;
  padding:0;
}
.manage-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 2px;
  border-bottom:1px solid var(--line);
}
.manage-row:last-child{border-bottom:none;}
.manage-name{
  flex:1;
  min-width:0;
  font-size:14.5px;
  color:var(--ink);
  display:flex;
  align-items:baseline;
  gap:8px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.manage-count{
  font-family:'Space Mono', monospace;
  font-size:10.5px;
  color:var(--ink-soft);
  flex-shrink:0;
}
.icon-btn-sm{
  background:none;
  border:none;
  color:var(--ink-soft);
  cursor:pointer;
  padding:5px;
  flex-shrink:0;
  display:flex;
}
.icon-btn-sm svg{width:16px;height:16px;stroke:currentColor;}
.icon-btn-sm.danger{color:var(--brick);}
.manage-confirm-delete{
  font-family:'Libre Franklin', sans-serif;
  font-weight:600;
  font-size:11.5px;
  color:#fff;

<script>
/* ---------- Local on-device storage (IndexedDB) ----------
   This app stores everything locally in your browser via IndexedDB,
   so it works fully offline and standalone — no account, no server,
   no dependency on any external service. Data stays on this device. */
const DB_NAME = 'mimi-casa-cookbook';
const STORE_NAME = 'kv';
let _dbPromise = null;

function _openDB(){
  if(_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    if(!('indexedDB' in window)){
      reject(new Error('This browser does not support local storage (IndexedDB).'));
      return;
    }
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if(!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error('Could not open local storage.'));
  });
  return _dbPromise;
}

const storageAPI = {
  async get(key){
    const db = await _openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get(key);
      req.onsuccess = () => resolve(req.result === undefined ? null : { key, value: req.result });
      req.onerror = () => reject(req.error);
    });
  },
  async set(key, value){
    const db = await _openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(value, key);
      tx.oncomplete = () => resolve({ key, value });
      tx.onerror = () => reject(tx.error);
    });
  },
  async delete(key){
    const db = await _openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).delete(key);
      tx.oncomplete = () => resolve({ key, deleted:true });
      tx.onerror = () => reject(tx.error);
    });
  },
};

const CATEGORIES = [
  { id:'breakfast', label:'Breakfast / Brunch' },
  { id:'weekday', label:'Weekday Lunch & Dinner' },
  { id:'weekend', label:'Weekend Dinner' },

  { id:'vege', label:'Vege', chip:'🥦 Vege' },

let activeSeasonFilter = 'all';

let state = {

function showToast(msg){

  clearTimeout(toastTimer);

}

const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);

async function ensureImage(id){
  if(imageCache[id] !== undefined || loadingImages.has(id)) return;
  loadingImages.add(id);
  try{
    const res = await storageAPI.get('recipe-image:'+id, false);
    imageCache[id] = res && res.value ? res.value : null;
  }catch(e){
    imageCache[id] = null;
  }
  loadingImages.delete(id);
  render();
}

async function ensureSourceImage(id){
  if(sourceImageCache[id] !== undefined || loadingSourceImages.has(id)) return;
  loadingSourceImages.add(id);
  try{
    const res = await storageAPI.get('recipe-source-image:'+id, false);
    sourceImageCache[id] = res && res.value ? res.value : null;
  }catch(e){
    sourceImageCache[id] = null;
  }
  loadingSourceImages.delete(id);
  render();
}

function estimateDataUrlBytes(dataUrl){
  const commaIdx = dataUrl.indexOf(',');
  const base64 = commaIdx >= 0 ? dataUrl.slice(commaIdx + 1) : dataUrl;
  return Math.floor(base64.length * 3 / 4);
}

function compressImage(file, maxDim){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      compressDataURL(reader.result, maxDim).then(resolve).catch(reject);
    };
    reader.onerror = () => reject(new Error('Could not read that file.'));
    reader.readAsDataURL(file);
  });
}

function compressDataURL(dataUrl, maxDim, maxBytes){
  maxDim = maxDim || 900;
  maxBytes = maxBytes || 2.5 * 1024 * 1024; // stay well under the 5MB per-key storage limit
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try{
        const render = (dim, quality) => {
          let { width, height } = img;
          if(width > dim || height > dim){
            if(width > height){ height = Math.round(height * dim / width); width = dim; }
            else { width = Math.round(width * dim / height); height = dim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          return canvas.toDataURL('image/jpeg', quality);
        };

        let dim = maxDim;
        let quality = 0.8;
        let out = render(dim, quality);
        let attempts = 0;
        while(estimateDataUrlBytes(out) > maxBytes && attempts < 7){
          attempts++;
          if(quality > 0.4) quality -= 0.15;
          else dim = Math.round(dim * 0.75);
          out = render(dim, quality);
        }

        if(estimateDataUrlBytes(out) > maxBytes){
          reject(new Error('That photo is too large to save, even after compression. Try a different photo.'));
          return;
        }
        resolve(out);
      }catch(e){ reject(e); }
    };
    img.onerror = () => reject(new Error('Could not read that image.'));
    img.src = dataUrl;
  });
}

async function loadData(){
  try{
    const res = await storageAPI.get('recipe-book-data', false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state.recipes = parsed.recipes || [];
      state.selection = parsed.selection || [];
      state.checked = parsed.checked || {};
      state.customCuisines = parsed.customCuisines || [];
      state.menuDays = parsed.menuDays || {};
      state.menuGroups = parsed.menuGroups || [];
    }
  }catch(e){
    // no existing data yet
  }
  loaded = true;
  render();
}

async function storageOpWithRetry(op, retries){
  retries = retries == null ? 2 : retries;
  let lastErr;
  for(let attempt = 0; attempt <= retries; attempt++){
    try{
      return await op();
    }catch(e){
      lastErr = e;
      if(attempt < retries){
        await new Promise(res => setTimeout(res, 350 * (attempt + 1)));
      }
    }
  }
  throw lastErr;
}

async function persistState(){
  return storageOpWithRetry(() => storageAPI.set('recipe-book-data', JSON.stringify(state), false));
}

function saveData(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      await persistState();
    }catch(e){
      console.error('Storage error', e);
      showToast("Couldn't save your changes — check your connection and try again.");
    }
  }, 150);
}

    pin:'<path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5z"/><path d="M12 14v8"/>',
    close:'<path d="M18 6L6 18M6 6l12 12"/>',
    check:'<path d="M20 6L9 17l-5-5"/>',
    edit:'<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/>',
    trash:'<path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>',
    link:'<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/>',
    list:'<path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/>',

}

function esc(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function recipesFor(cat){
  return state.recipes.filter(r => r.category === cat);
}

function filteredRecipesFor(cat){
  return recipesFor(cat).filter(r => {
    if(activeSeasonFilter !== 'all' && (r.season || '') !== activeSeasonFilter) return false;
    if(activeCuisineFilter !== 'all' && (r.cuisine || '') !== activeCuisineFilter) return false;
    if(activeLabelFilter !== 'all' && !(r.labels || []).includes(activeLabelFilter)) return false;
    return true;
  });
}

function distinctCuisines(){
  const set = new Set();
  state.recipes.forEach(r => { if(r.cuisine && r.cuisine.trim()) set.add(r.cuisine.trim()); });
  return Array.from(set).sort((a,b) => a.localeCompare(b));
}

function allCuisines(){
  const map = new Map(); // lowercase -> display form
  [...state.customCuisines, ...distinctCuisines()].forEach(c => {
    const trimmed = (c||'').trim();
    if(!trimmed) return;
    const key = trimmed.toLowerCase();
    if(!map.has(key)) map.set(key, trimmed);
  });
  return Array.from(map.values()).sort((a,b) => a.localeCompare(b));
}

function renameCuisine(oldName, newName){
  newName = (newName||'').trim();
  if(!newName || newName.toLowerCase() === oldName.toLowerCase()) return;
  state.customCuisines = state.customCuisines.filter(c => c.toLowerCase() !== oldName.toLowerCase());
  if(!state.customCuisines.some(c => c.toLowerCase() === newName.toLowerCase())){
    state.customCuisines.push(newName);
  }
  state.recipes.forEach(r => {
    if(r.cuisine && r.cuisine.toLowerCase() === oldName.toLowerCase()) r.cuisine = newName;
  });
  if(formCuisine && formCuisine.toLowerCase() === oldName.toLowerCase()) formCuisine = newName;
  if(activeCuisineFilter && activeCuisineFilter !== 'all' && activeCuisineFilter.toLowerCase() === oldName.toLowerCase()){
    activeCuisineFilter = newName;
  }
  saveData();
}

function deleteCuisine(name){
  state.customCuisines = state.customCuisines.filter(c => c.toLowerCase() !== name.toLowerCase());
  state.recipes.forEach(r => {
    if(r.cuisine && r.cuisine.toLowerCase() === name.toLowerCase()) r.cuisine = '';
  });
  if(formCuisine && formCuisine.toLowerCase() === name.toLowerCase()) formCuisine = '';
  if(activeCuisineFilter && activeCuisineFilter !== 'all' && activeCuisineFilter.toLowerCase() === name.toLowerCase()){
    activeCuisineFilter = 'all';
  }
  saveData();
}

function seasonChip(id){
  const s = SEASONS.find(s => s.id === id);
  return s ? s.chip : SEASONS[0].chip;
}

function formatAmount(i, factor){
  factor = factor || 1;
  if(!i.amount && !i.unit) return '—';
  const amtStr = String(i.amount||'').trim();
  const isNumeric = /^-?\d*\.?\d+$/.test(amtStr);
  if(isNumeric && factor !== 1){
    const numeric = parseFloat(amtStr);
    return `${trimNum(numeric * factor)}${i.unit? ' '+i.unit : ''}`.trim();
  }
  return `${i.amount||''}${i.unit? ' '+i.unit : ''}`.trim();
}

function menuHTML(){
  const selectedIds = new Set(state.selection);
  const consumed = new Set();
  const groups = [];
  const survivingGroups = [];

  state.menuGroups.forEach(g => {
    const validIds = g.recipeIds.filter(id => selectedIds.has(id));
    const recipes = validIds.map(id => state.recipes.find(r => r.id === id)).filter(Boolean);
    if(recipes.length >= 2){
      groups.push({ group: {...g, recipeIds: validIds}, recipes });
      validIds.forEach(id => consumed.add(id));
      survivingGroups.push({ id: g.id, name: g.name, recipeIds: validIds });
    }
  });
  if(JSON.stringify(survivingGroups) !== JSON.stringify(state.menuGroups)){
    state.menuGroups = survivingGroups;
    saveData();
  }

  const ungrouped = [];
  state.selection.forEach(id => {
    if(consumed.has(id)) return;
    const r = state.recipes.find(x => x.id === id);
    if(r) ungrouped.push(r);
  });

  const checkedCount = menuCheckedIds.filter(id => selectedIds.has(id) && !consumed.has(id)).length;

  return `
    <div class="sheet-top">
      <h2>This week's menu</h2>
      <button class="icon-btn" id="btn-close">${icon('close')}</button>
    </div>
    ${(groups.length === 0 && ungrouped.length === 0) ? `
      <div class="shop-empty">
        <p>Tap the + on any recipe to add it to this week's menu.</p>
      </div>

      <ul class="menu-list">

        ${ungrouped.map(r => menuRecipeRowHTML(r)).join('')}

        <div class="sheet-actions">
          <button class="btn primary" id="btn-start-group" style="width:100%;">Group ${checkedCount} selected into a meal</button>
        </div>
      ` : '')}
    `}
  `;
}

function aggregateIngredients(recipes){
  const groups = {};
  const order = [];
  recipes.forEach(r => {
    r.ingredients.forEach(i => {
      const name = (i.name||'').trim();
      if(!name) return;
      const unit = (i.unit||'').trim();
      const kind = i.kind === 'condiment' ? 'condiment' : 'ingredient';
      const key = kind + '::' + name.toLowerCase() + '::' + unit.toLowerCase();
      const numeric = parseFloat(i.amount);
      const isNumeric = i.amount !== '' && !isNaN(numeric);
      if(!groups[key]){
        groups[key] = { name, unit, kind, sum:0, hasNumeric:false, texts:[] };
        order.push(key);
      }
      if(isNumeric){
        groups[key].sum += numeric;
        groups[key].hasNumeric = true;
      } else if((i.amount||'').trim()){
        groups[key].texts.push(i.amount.trim());
      }
    });
  });
  const items = order.map(key => {
    const g = groups[key];
    const parts = [];
    if(g.hasNumeric) parts.push(`${trimNum(g.sum)}${g.unit?' '+g.unit:''}`);
    if(g.texts.length) parts.push(g.texts.join(', '));
    const display = parts.join(' + ') || '—';
    return { key, name: g.name, display, kind: g.kind };
  });
  return {
    ingredients: items.filter(i => i.kind === 'ingredient'),
    condiments: items.filter(i => i.kind === 'condiment'),
  };
}

function trimNum(n){
  return Math.round(n*100)/100;
}

      if(fCuisineNewInput) fCuisineNewInput.focus();
      return;
    }
    const exists = allCuisines().some(c => c.toLowerCase() === val.toLowerCase());
    if(!exists){
      state.customCuisines.push(val);
      saveData();
    }
    formCuisine = val;
    cuisineAddMode = false;
    cuisineNewValue = '';
    render();
  });

    cuisineEditValue = '';

  const btnDoneManagingCuisines = document.getElementById('btn-done-managing-cuisines');
  if(btnDoneManagingCuisines) btnDoneManagingCuisines.addEventListener('click', returnToForm);

  if(fManageCuisineNew) fManageCuisineNew.addEventListener('input', () => { manageCuisineNewValue = fManageCuisineNew.value; });

  const btnManageAddCuisine = document.getElementById('btn-manage-add-cuisine');
  if(btnManageAddCuisine) btnManageAddCuisine.addEventListener('click', () => {
    const val = (manageCuisineNewValue || '').trim();
    if(!val) return;
    if(!allCuisines().some(c => c.toLowerCase() === val.toLowerCase())){
      state.customCuisines.push(val);
      saveData();
    }

    render();

  app.querySelectorAll('[data-edit-cuisine]').forEach(el => {
    el.addEventListener('click', () => {
      cuisineEditTarget = el.dataset.editCuisine;
      cuisineEditValue = el.dataset.editCuisine;

      render();

  app.querySelectorAll('[data-delete-cuisine]').forEach(el => {
    el.addEventListener('click', () => {
      confirmDeleteCuisine = el.dataset.deleteCuisine;
      render();

  app.querySelectorAll('[data-confirm-delete-cuisine]').forEach(el => {
    el.addEventListener('click', () => {

      confirmDeleteCuisine = null;

  const fRenameCuisineInput = document.getElementById('f-rename-cuisine-input');

  app.querySelectorAll('[data-confirm-rename]').forEach(el => {
    el.addEventListener('click', () => {

  const btnCancelRenameCuisine = document.getElementById('btn-cancel-rename-cuisine');

function focusLastRow(containerId){
  const rows = document.querySelectorAll('#'+containerId+' .ing-row');
  if(rows.length){
    const last = rows[rows.length-1].querySelector('.ing-name');
    if(last) last.focus();
  }

async function exportBackup(){
  backupBusy = true;
  backupMessage = null;
  render();
  try{
    const images = {};
    const sourceImages = {};
    for(const r of state.recipes){
      if(r.hasImage){
        try{
          const res = await storageOpWithRetry(() => storageAPI.get('recipe-image:'+r.id, false));
          if(res && res.value) images[r.id] = res.value;
        }catch(e){ /* skip this one photo rather than fail the whole export */ }
      }
      if(r.hasSourceImage){
        try{
          const res = await storageOpWithRetry(() => storageAPI.get('recipe-source-image:'+r.id, false));
          if(res && res.value) sourceImages[r.id] = res.value;
        }catch(e){ /* skip this one photo rather than fail the whole export */ }
      }
    }

    const payload = {
      app: 'Mimi Casa Cookbook',
      exportedAt: new Date().toISOString(),
      recipes: state.recipes,
      customCuisines: state.customCuisines,
      menuGroups: state.menuGroups,
      images,
      sourceImages,
    };

    const blob = new Blob([JSON.stringify(payload)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mimi-casa-cookbook-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }catch(e){
    console.error('Export failed', e);
    backupMessage = "Couldn't prepare the backup — try again.";
  }
  backupBusy = false;
  render();
}

async function restoreBackup(){
  if(!pendingImportPayload) return;
  backupBusy = true;
  render();
  try{
    const payload = pendingImportPayload;

    state.recipes = payload.recipes || [];
    state.customCuisines = payload.customCuisines || [];
    state.menuGroups = payload.menuGroups || [];
    state.selection = [];
    state.checked = {};
    imageCache = {};
    sourceImageCache = {};

    await persistState();

    const images = payload.images || {};
    for(const id of Object.keys(images)){
      try{ await storageOpWithRetry(() => storageAPI.set('recipe-image:'+id, images[id], false)); }
      catch(e){ console.error('Could not restore photo for', id, e); }
    }
    const sourceImages = payload.sourceImages || {};
    for(const id of Object.keys(sourceImages)){
      try{ await storageOpWithRetry(() => storageAPI.set('recipe-source-image:'+id, sourceImages[id], false)); }
      catch(e){ console.error('Could not restore source photo for', id, e); }
    }

    pendingImportPayload = null;
    pendingImportFilename = null;
    sheet = null;
    showToast('Backup restored.');
  }catch(e){
    console.error('Restore failed', e);
    backupMessage = "Couldn't restore that backup — try again.";
  }
  backupBusy = false;
  render();
}

function openRecipeDetail(id){
  viewingId = id;
  const r = state.recipes.find(x=>x.id===id);
  detailServings = (r && Number(r.servings) > 0) ? Number(r.servings) : 2;
  sheet = 'detail';
  render();
}

function toggleSelection(id){
  if(state.selection.includes(id)){
    state.selection = state.selection.filter(x=>x!==id);
  } else {
    state.selection.push(id);
  }
  saveData();
  render();
}

function closeSheet(){
  sheet = null;
  editingId = null;
  viewingId = null;
  detailServings = null;
  pendingImportPayload = null;
  pendingImportFilename = null;
  backupMessage = null;
  render();
}

async function saveRecipe(){
  const title = (formTitle||'').trim();
  if(!title){
    const el = document.getElementById('f-title');
    if(el) el.focus();
    return;
  }
  const category = formCategory;
  const servingsRaw = parseInt(formServings, 10);
  const servings = servingsRaw > 0 ? servingsRaw : 2;
  const instructions = (formInstructions||'').trim();
  const cuisine = (formCuisine||'').trim();
  const season = SEASONS.some(s => s.id === formSeason) ? formSeason : '';
  const labels = LABELS.filter(l => formLabels.includes(l.id)).map(l => l.id);
  const ingredients = [
    ...formIngredients.map(i => ({ name:(i.name||'').trim(), amount:(i.amount||'').trim(), unit:(i.unit||'').trim(), kind:'ingredient' })),
    ...formCondiments.map(i => ({ name:(i.name||'').trim(), amount:(i.amount||'').trim(), unit:(i.unit||'').trim(), kind:'condiment' })),
  ].filter(i => i.name);

  let id = editingId;
  const hasImage = !!formImage;
  const hasSourceImage = !!formSourceImage;
  const sourceUrl = (formSourceUrl||'').trim();

  if(editingId){
    const r = state.recipes.find(x=>x.id===editingId);
    Object.assign(r, { title, category, servings, instructions, ingredients, hasImage, sourceUrl, hasSourceImage, cuisine, season, labels });
  } else {
    id = uid();
    state.recipes.push({ id, title, category, servings, instructions, ingredients, hasImage, sourceUrl, hasSourceImage, cuisine, season, labels });
  }

  sheet = null;
  editingId = null;
  render();

  try{
    await persistState();
  }catch(e){
    console.error('Storage error', e);
    showToast("Couldn't save your changes — check your connection and try again.");
  }

  if(formImageChanged){
    try{
      if(hasImage){
        await storageOpWithRetry(() => storageAPI.set('recipe-image:'+id, formImage, false));
        imageCache[id] = formImage;
      } else {
        await storageOpWithRetry(() => storageAPI.delete('recipe-image:'+id, false));
        imageCache[id] = null;
      }
    }catch(e){
      console.error('Could not save photo', e);
      showToast("The recipe saved, but the photo couldn't be stored — it may be too large, or there was a connection issue.");
    }
  }
  if(formSourceImageChanged){
    try{
      if(hasSourceImage){
        await storageOpWithRetry(() => storageAPI.set('recipe-source-image:'+id, formSourceImage, false));
        sourceImageCache[id] = formSourceImage;
      } else {
        await storageOpWithRetry(() => storageAPI.delete('recipe-source-image:'+id, false));
        sourceImageCache[id] = null;
      }
    }catch(e){
      console.error('Could not save source photo', e);
      showToast("The recipe saved, but the source photo couldn't be stored — it may be too large, or there was a connection issue.");
    }
  }
  formImage = null;
  formImageChanged = false;
  formSourceImage = null;
  formSourceImageChanged = false;
}

/* ---------- Paste recipe text ---------- */

const FRACTION_CHARS = {'½':'1/2','¼':'1/4','¾':'3/4','⅓':'1/3','⅔':'2/3','⅛':'1/8','⅜':'3/8','⅝':'5/8','⅞':'7/8','⅕':'1/5','⅖':'2/5','⅗':'3/5','⅘':'4/5'};
function normalizeFractionChars(s){
  return s.replace(/[½¼¾⅓⅔⅛⅜⅝⅞⅕⅖⅗⅘]/g, ch => FRACTION_CHARS[ch] || ch);
}
function fractionToDecimal(str){
  str = str.trim();
  const mixed = str.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if(mixed) return parseInt(mixed[1],10) + parseInt(mixed[2],10) / parseInt(mixed[3],10);
  const frac = str.match(/^(\d+)\/(\d+)$/);
  if(frac) return parseInt(frac[1],10) / parseInt(frac[2],10);
  const num = parseFloat(str);
  return isNaN(num) ? null : num;
}

// Two-word units are checked before single-word ones (e.g. "fl oz" before "oz").
const TWO_WORD_UNITS = ['fl oz','fluid ounce','fluid ounces','fluid oz'];
const UNIT_WORDS = ['cups','cup','c','tablespoons','tablespoon','tbsp','tbsps','tbs','teaspoons','teaspoon','tsp','tsps',
  'ounces','ounce','oz','pounds','pound','lb','lbs','grams','gram','gr','g','kilograms','kilogram','kg',
  'milligrams','milligram','mg','milliliters','milliliter','ml','liters','liter','litre','litres','l',
  'pints','pint','pt','quarts','quart','qt','gallons','gallon','gal',
  'cloves','clove','pinch','pinches','dash','dashes','sprinkle','sprinkles',
  'slices','slice','cans','can','jars','jar','packages','package','pkg','bunches','bunch',
  'sprigs','sprig','sticks','stick','heads','head','pieces','piece','pcs','pc',
  'large','medium','small','whole'];

// Descriptor-style quantities with no number, e.g. "a pinch of salt", "a handful of parsley".
const DESCRIPTOR_UNITS = ['pinch','pinches','handful','handfuls','knob','splash','splashes','drizzle','drizzles',
  'squeeze','squeezes','dash','dashes','sprinkle','sprinkles','glug','glugs'];

// Curated list of pantry staples / spices / condiments — kept deliberately narrow so fresh,
// bulk-quantity items (like a bunch of parsley) stay classified as ingredients.
const CONDIMENT_KEYWORDS = [
  'salt','black pepper','white pepper','peppercorn','sugar','brown sugar','icing sugar','powdered sugar',
  'cumin','paprika','cinnamon','turmeric','cayenne','nutmeg','allspice','cardamom','ground clove','ground cloves',
  'garlic powder','onion powder','ginger powder','mustard powder','mustard seed',
  'chili flake','chilli flake','red pepper flake','crushed red pepper','pul biber','aleppo pepper',
  'chili powder','chilli powder','curry powder','garam masala','five spice','za\'atar','zaatar','sumac','harissa',
  'seasoning','spice mix','spice blend','msg',
  'baking powder','baking soda','yeast','cornstarch','corn starch',
  'vinegar','soy sauce','fish sauce','worcestershire','ketchup','mayonnaise','mayo','hot sauce','sriracha','tabasco',
  'dijon','mustard','tahini','honey','maple syrup','molasses',
  'olive oil','vegetable oil','sesame oil','sunflower oil','canola oil','coconut oil','cooking oil',
  'vanilla extract','vanilla essence','food coloring','food colouring',
  'stock cube','bouillon','sea salt','kosher salt'
];

function classifyIngredientKind(name){
  const n = (name || '').toLowerCase();
  return CONDIMENT_KEYWORDS.some(k => n.includes(k)) ? 'condiment' : 'ingredient';
}

function parseIngredientLine(raw){
  const text = normalizeFractionChars(String(raw || '').trim());
  if(!text) return { name:'', amount:'', unit:'', kind:'ingredient' };

  // Descriptor quantities: "a pinch of salt", "a splash of milk"
  const descMatch = text.match(/^(?:a|an)\s+([a-zA-Z]+)\s+of\s+(.+)$/i);
  if(descMatch && DESCRIPTOR_UNITS.includes(descMatch[1].toLowerCase())){
    const name = descMatch[2].trim();
    return { name, amount:'', unit: descMatch[1].toLowerCase(), kind: classifyIngredientKind(name) };
  }

  // Leading quantity, optionally a range like "2-3" or "2 to 3"
  const numPattern = '(?:\\d+\\s+\\d+\\/\\d+|\\d+\\/\\d+|\\d*\\.?\\d+)';
  const qtyMatch = text.match(new RegExp(`^(${numPattern})(\\s*(?:-|–|to)\\s*${numPattern})?\\s*`, 'i'));
  let amount = '';
  let rest = text;
  if(qtyMatch){
    if(qtyMatch[2]){
      amount = (qtyMatch[1] + qtyMatch[2]).replace(/\s+/g, ' ').trim();
    } else {
      const dec = fractionToDecimal(qtyMatch[1]);
      amount = dec !== null ? String(trimNum(dec)) : '';
    }
    rest = text.slice(qtyMatch[0].length).trim();
  }

  // Unit: try two-word units first (e.g. "fl oz"), then single-word.
  let unit = '';
  const twoWordMatch = rest.match(/^([a-zA-Z]+\s+[a-zA-Z]+)\.?\s+/);
  if(twoWordMatch && TWO_WORD_UNITS.includes(twoWordMatch[1].toLowerCase())){
    unit = twoWordMatch[1];
    rest = rest.slice(twoWordMatch[0].length).trim();
  } else {
    const unitMatch = rest.match(/^([a-zA-Z]+)\.?\s+/);
    if(unitMatch && UNIT_WORDS.includes(unitMatch[1].toLowerCase())){
      unit = unitMatch[1];
      rest = rest.slice(unitMatch[0].length).trim();
    }
  }

  // "salt, to taste" / "pepper to taste" — no real amount, just a to-taste note.
  if(!amount && !unit && /\bto taste\b/i.test(rest)){
    unit = '';
  }

  const name = rest || text;
  return { name, amount, unit, kind: classifyIngredientKind(name) };
}

function stripLeadingSymbols(l){
  return l.replace(/^[^\w]+/, '').trim();
}
function stripStepNumber(l){
  return l.replace(/^(?:step\s*)?\d+\s*[\.\):]\s*/i, '').trim();
}

function parsePastedRecipe(text){
  const rawLines = text.split('\n').map(l => l.trim());

  const isIngHeading = l => /^ingredients\b/i.test(l);
  const isCondHeading = l => /^(condiments?|seasonings?|spices?|for the (seasoning|dressing|sauce))\b/i.test(l);
  const isInstrHeading = l => /^(instructions|directions|method|steps|preparation|how (i|to) make it)\b/i.test(l);
  const isNotesHeading = l => /^notes?\b/i.test(l);

  let ingIdx = -1, condIdx = -1, instrIdx = -1, notesIdx = -1;
  rawLines.forEach((l, idx) => {
    if(ingIdx === -1 && isIngHeading(l)){ ingIdx = idx; return; }
    if(instrIdx === -1 && isInstrHeading(l)){ instrIdx = idx; return; }
    if(instrIdx === -1 && ingIdx !== -1 && condIdx === -1 && isCondHeading(l)){ condIdx = idx; return; }
    if(notesIdx === -1 && instrIdx !== -1 && idx > instrIdx && isNotesHeading(l)) notesIdx = idx;
  });

  const result = { title:null, servings:null, ingredients:[], condiments:[], instructions:null };

  if(ingIdx > 0){
    for(let i = 0; i < ingIdx; i++){
      const l = rawLines[i];
      if(l && l.length > 2 && l.length < 90 && !/servings?|yield|prep time|cook time|total time|rating|^\d+(\.\d+)?\s*\(/i.test(l)){
        result.title = l;
        break;
      }
    }
  }

  const servMatch = text.match(/\b(?:serves|servings?|yield)s?\s*[:\-]?\s*(\d+)/i);
  if(servMatch) result.servings = parseInt(servMatch[1], 10);

  if(ingIdx !== -1){
    const blockEnd = instrIdx !== -1 && instrIdx > ingIdx ? instrIdx : rawLines.length;

    if(condIdx !== -1 && condIdx > ingIdx){
      // Explicit "Condiments/Seasoning" heading found — use it as the split point.
      const ingLines = rawLines.slice(ingIdx + 1, condIdx).map(stripLeadingSymbols).filter(l => l);
      const condLines = rawLines.slice(condIdx + 1, blockEnd).map(stripLeadingSymbols).filter(l => l);
      result.ingredients = ingLines.map(parseIngredientLine).filter(i => i.name).map(i => ({...i, kind:'ingredient'}));
      result.condiments = condLines.map(parseIngredientLine).filter(i => i.name).map(i => ({...i, kind:'condiment'}));
    } else {
      // No explicit heading — classify each line automatically.
      const lines = rawLines.slice(ingIdx + 1, blockEnd).map(stripLeadingSymbols).filter(l => l);
      const parsedLines = lines.map(parseIngredientLine).filter(i => i.name);
      result.ingredients = parsedLines.filter(i => i.kind === 'ingredient');
      result.condiments = parsedLines.filter(i => i.kind === 'condiment');
    }
  }

  if(instrIdx !== -1){
    const end = notesIdx !== -1 && notesIdx > instrIdx ? notesIdx : rawLines.length;
    const lines = rawLines.slice(instrIdx + 1, end)
      .map(stripLeadingSymbols)
      .map(stripStepNumber)
      .filter(l => l);
    if(lines.length) result.instructions = lines.map((s,idx) => `${idx+1}. ${s}`).join('\n');
  }

  return result;
}

function parsePasteText(){
  const text = (pasteText || '').trim();
  if(!text){
    pasteError = 'Paste some recipe text first.';
    pasteSuccessMsg = null;
    render();
    return;
  }

  const parsed = parsePastedRecipe(text);
  let foundAnything = false;

  if(parsed.title){ formTitle = parsed.title; foundAnything = true; }
  if(parsed.servings){ formServings = parsed.servings; foundAnything = true; }
  if(parsed.ingredients.length){
    formIngredients = parsed.ingredients.map(i => ({ name:i.name, amount:i.amount, unit:i.unit }));
    foundAnything = true;
  }
  if(parsed.condiments.length){
    formCondiments = parsed.condiments.map(i => ({ name:i.name, amount:i.amount, unit:i.unit }));
    foundAnything = true;
  }
  if(parsed.instructions){ formInstructions = parsed.instructions; foundAnything = true; }

  if(!foundAnything){
    pasteError = "Couldn't find clear ingredients or instructions in that text. Try including headings like \"Ingredients\" and \"Instructions\", or just fill in the form manually below.";
    pasteSuccessMsg = null;
  }else{
    const bits = [];
    if(parsed.ingredients.length) bits.push(`${parsed.ingredients.length} ingredient${parsed.ingredients.length===1?'':'s'}`);
    if(parsed.condiments.length) bits.push(`${parsed.condiments.length} condiment${parsed.condiments.length===1?'':'s'}/seasoning`);
    if(parsed.instructions) bits.push('method');
    pasteSuccessMsg = `Parsed ${bits.join(', ')} — review the details below, then save.`;
    pasteError = null;
  }
  render();
}
